version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/data/hadith.db
      - PORT=8080
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=*
      - DEFAULT_LANGUAGE=ar
    volumes:
      - hadith_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hadith_data: